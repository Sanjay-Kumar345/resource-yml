trigger:
- master

pool:
  name:  acs-agent-pool



steps:

- script: |
    terraform version
  displayName: 'Terraform Version'

- script: |
    terraform init
  displayName: 'Terraform Init'

- script: |
    terraform validate
  displayName: 'Terraform Validate'

- script: |
    terraform plan
  displayName: 'Terraform Plan'

- script: |
    terraform apply --auto-approve
  displayName: 'Terraform Apply'
