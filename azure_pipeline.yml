trigger:
- master

pool:
  vmImage: 'ubuntu-latest'

steps:

- script: |
    terraform version
  displayName: 'Terraform Version'

- script: |
    terraform init
  displayName: 'Terraform Init'

- script: |
    terraform validate
  displayName: 'Terraform Validate'

- script: |
    terraform plan
  displayName: 'Terraform Plan'